services:
  - type: web
    name: bilim-platformasi-backend
    runtime: node
    region: frankfurt
    plan: free
    rootDir: apps/backend
    buildCommand: npm install --include=dev && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run seed && npm run start:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: bilim-platformasi-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: VIDEO_TOKEN_SECRET
        generateValue: true
      - key: VIDEO_TOKEN_TTL_SECONDS
        value: 600
      - key: MAX_DEVICES_PER_USER
        value: 2
      - key: DEFAULT_ENROLLMENT_DURATION_DAYS
        value: 120
      - key: FRONTEND_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_BOT_USERNAME
        sync: false
      - key: TELEGRAM_OWNER_CHAT_ID
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        generateValue: true

databases:
  - name: bilim-platformasi-db
    plan: free
    region: frankfurt
    databaseName: lms_db
    user: lms_user
